name: Build & Release CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-latest
            python-arch: x64
          - platform: windows
            arch: x64
            runner: windows-latest
            python-arch: x64
          - platform: windows
            arch: x86
            runner: windows-latest
            python-arch: x86

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11 (${{ matrix.python-arch }})
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python-arch }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq binutils

      # agentsdk is not on PyPI — install from GitHub first
      - name: Install agentsdk from GitHub
        run: >
          pip install
          "agentsdk @ git+https://github.com/allanpk716/ai-agent-cli-rules.git@main#subdirectory=sdks/python"

      - name: Install PyInstaller
        run: pip install pyinstaller

      # Install project without dependency resolution (agentsdk already satisfied)
      - name: Install project
        run: pip install --no-deps -e .

      - name: Install remaining runtime dependencies
        run: >
          pip install
          "typer>=0.9.0"
          "httpx>=0.25.0"
          "readability-lxml>=0.8.1"
          "markdownify>=0.11.0"
          "pyyaml>=6.0"
          "openai>=1.0.0"
          "platformdirs>=3.0"

      - name: Build with PyInstaller (--skip-install)
        run: python build.py --skip-install

      - name: Prepare release binary
        id: binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            EXT=".exe"
          else
            EXT=""
          fi
          ASSET_NAME="web-clip-helper-${{ matrix.platform }}-${{ matrix.arch }}${EXT}"
          mv "dist/web-clip-helper${EXT}" "${ASSET_NAME}"
          chmod +x "${ASSET_NAME}" || true
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"
          ls -lh "${ASSET_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.binary.outputs.asset_name }}
          path: ${{ steps.binary.outputs.asset_name }}
          if-no-files-found: error

  build-linux-x86:
    name: Build linux-x86 (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in i386 container
        run: |
          docker run --rm \
            --platform linux/386 \
            -v "$(pwd)":/src \
            -w /src \
            i386/python:3.11-slim \
            bash -c '
              set -e
              echo "--- Installing system deps ---"
              apt-get update -qq && apt-get install -y -qq binutils git > /dev/null 2>&1

              echo "--- Installing agentsdk from GitHub ---"
              pip install --quiet "agentsdk @ git+https://github.com/allanpk716/ai-agent-cli-rules.git@main#subdirectory=sdks/python"

              echo "--- Installing PyInstaller ---"
              pip install --quiet pyinstaller

              echo "--- Installing project (no deps) ---"
              pip install --no-deps -e .

              echo "--- Installing runtime dependencies ---"
              pip install --quiet \
                "typer>=0.9.0" \
                "httpx>=0.25.0" \
                "readability-lxml>=0.8.1" \
                "markdownify>=0.11.0" \
                "pyyaml>=6.0" \
                "openai>=1.0.0" \
                "platformdirs>=3.0"

              echo "--- Running PyInstaller ---"
              python build.py --skip-install

              echo "--- Build complete ---"
              mv dist/web-clip-helper dist/web-clip-helper-linux-x86
              chmod +x dist/web-clip-helper-linux-x86
              ls -lh dist/web-clip-helper-linux-x86
            '

      - name: Fix ownership for artifact upload
        run: sudo chown -R $(id -u):$(id -g) dist/

      - name: Prepare release binary
        id: binary
        shell: bash
        run: |
          ASSET_NAME="web-clip-helper-linux-x86"
          chmod +x "dist/${ASSET_NAME}"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"
          ls -lh "dist/${ASSET_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.binary.outputs.asset_name }}
          path: dist/${{ steps.binary.outputs.asset_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-native, build-linux-x86]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
